<?xml version="1.0" encoding="UTF-8"?>
<svg width="380" height="500" viewBox="0 0 380 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Screen hole mask: white = visible case, black = transparent screen -->
    <mask id="caseMask">
      <rect width="380" height="500" fill="white"/>
      <rect x="74" y="108" width="232" height="344" rx="58" ry="58" fill="black"/>
    </mask>

    <!-- Black Titanium case gradient -->
    <linearGradient id="caseGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#3e3e3e"/>
      <stop offset="28%"  stop-color="#272727"/>
      <stop offset="68%"  stop-color="#191919"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>

    <!-- Band gradient (dark, slight center highlight) -->
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#161616"/>
      <stop offset="45%"  stop-color="#232323"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>

    <!-- Digital Crown gradient (left=case side, right=outer tip) -->
    <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="50%"  stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>

    <!-- Action button gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════
       BAND TOP  (x=152, y=0, w=76, h=100)
  ════════════════════════════════════════════════ -->
  <rect x="152" y="0" width="76" height="100" rx="8" fill="url(#bandGrad)"/>
  <!-- Side edge borders -->
  <rect x="152" y="0" width="76" height="100" rx="8" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Ocean Band horizontal ribs -->
  <rect x="155" y=" 9" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="17" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="25" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="33" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="41" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="49" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="57" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="65" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="73" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="81" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="89" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>

  <!-- ═══════════════════════════════════════════════
       BAND BOTTOM  (x=152, y=464, w=76, h=36)
  ════════════════════════════════════════════════ -->
  <rect x="152" y="464" width="76" height="36" rx="8" fill="url(#bandGrad)"/>
  <rect x="152" y="464" width="76" height="36" rx="8" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="155" y="473" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="481" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>
  <rect x="155" y="489" width="70" height="2" rx="1" fill="rgba(255,255,255,0.055)"/>

  <!-- ═══════════════════════════════════════════════
       CASE BODY  (x=62, y=96, w=256, h=368, rx=72)
       Screen hole masked out via caseMask
  ════════════════════════════════════════════════ -->
  <rect x="62" y="96" width="256" height="368" rx="72" fill="url(#caseGrad)" mask="url(#caseMask)"/>
  <!-- Outer edge highlight (top + left lighter) -->
  <rect x="62" y="96" width="256" height="368" rx="72" fill="none"
        stroke="rgba(255,255,255,0.10)" stroke-width="1.5" mask="url(#caseMask)"/>
  <!-- Subtle left-side chamfer shine -->
  <rect x="64" y="140" width="3" height="280" rx="1.5" fill="rgba(255,255,255,0.05)" mask="url(#caseMask)"/>

  <!-- Bezel ring — dark inner shadow around screen edge -->
  <rect x="74" y="108" width="232" height="344" rx="58" fill="none"
        stroke="rgba(0,0,0,0.60)" stroke-width="3.5"/>
  <!-- Bezel ring — faint highlight offset 1px down (catch-light) -->
  <rect x="74" y="109" width="232" height="344" rx="58" fill="none"
        stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════
       DIGITAL CROWN  — right side, upper
       Orange accent ring around the crown body
  ════════════════════════════════════════════════ -->
  <!-- Outer orange accent ring -->
  <rect x="313" y="155" width="28" height="92" rx="11"
        fill="none" stroke="rgba(232,114,42,0.58)" stroke-width="2.5"/>
  <!-- Crown body -->
  <rect x="315" y="157" width="24" height="88" rx="9" fill="url(#crownGrad)"/>
  <!-- Crown left-edge highlight (catches case glow) -->
  <rect x="315" y="157" width="6"  height="88" rx="3"  fill="rgba(255,255,255,0.07)"/>
  <!-- Crown outer stroke -->
  <rect x="315" y="157" width="24" height="88" rx="9"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Knurl grooves (13 ribs) -->
  <rect x="319" y="167" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="173" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="179" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="185" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="191" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="197" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="203" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="209" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="215" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="221" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="227" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="233" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>
  <rect x="319" y="239" width="17" height="1.5" rx="0.75" fill="rgba(255,255,255,0.16)"/>

  <!-- ═══════════════════════════════════════════════
       ACTION BUTTON  — right side, below crown
  ════════════════════════════════════════════════ -->
  <rect x="316" y="272" width="18" height="52" rx="6" fill="url(#btnGrad)"/>
  <rect x="316" y="272" width="18" height="52" rx="6"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Button left-edge highlight -->
  <rect x="316" y="272" width="5"  height="52" rx="2.5" fill="rgba(255,255,255,0.06)"/>

</svg>
